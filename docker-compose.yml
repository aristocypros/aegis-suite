# Explicit Compose project name — pinned so it no longer derives from the
# folder name. Renaming the directory will NOT re-prefix (and orphan) the
# named volumes below, which hold Vault key material + Postgres state.
name: aegis-suite

services:
  opa:
    image: openpolicyagent/opa
    ports:
      - "8181"
    deploy:
      replicas: 3
    volumes:
      # BUNDLE-PULL mode: OPA boots with ONLY this config and pulls everything
      # (system/studio authz Rego + policies + data + platform_keys) from the
      # backend's /bundle endpoint. It no longer mounts ./opa policies or a
      # platform-trust JSON — those now travel inside the bundle.
      - ./opa/config.yaml:/config/config.yaml:ro
      # The bundle bearer token (opa_bundle_token) lives here; config.yaml
      # reads it via credentials.bearer.token_path.
      - vault_secrets:/vault/secrets:ro
    command:
      - "run"
      - "--server"
      - "--log-level=info"
      - "--addr=0.0.0.0:8181"
      - "--config-file=/config/config.yaml"
      # Token-based authentication: extracts Authorization: Bearer <token>
      # into input.identity for every OPA REST request.
      - "--authentication=token"
      # Authorization gate: every request must pass data.system.authz.allow.
      # Until the first bundle activates this is undefined → deny-all
      # (fail-closed). /health is served before this gate.
      - "--authorization=basic"
    depends_on:
      # INVERTED dependency: OPA now pulls its bundle from the backend, so the
      # backend must be healthy (serving /bundle) first. vault-init provides
      # the bundle token file OPA presents.
      backend:
        condition: service_healthy
      vault-init:
        condition: service_healthy
    healthcheck:
      # The OPA image is minimal (no shell/wget) — this only confirms the
      # binary runs. Bundle-activation readiness is fail-closed at the policy
      # layer; the PEP tolerates an un-activated OPA per request.
      test: ["CMD", "/opa", "version"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - opa-net

  # Template for a dedicated tenant OPA container (Physical Tenant Isolation).
  # To deploy a physical OPA container for a specific tenant, copy this service definition,
  # assign a unique port mapping (e.g. 8182:8181), and supply the tenant's organization UUID in the
  # OPA_BUNDLE_PATH environment parameter.
  # opa-tenant-example:
  #   image: openpolicyagent/opa
  #   ports:
  #     - "8182:8181"
  #   volumes:
  #     - ./opa/config.yaml:/config/config.yaml:ro
  #     - vault_secrets:/vault/secrets:ro
  #   environment:
  #     - OPA_BUNDLE_PATH=/bundle/orgs/REPLACE_WITH_ORG_UUID_HERE/aegis.tar.gz
  #   command:
  #     - "run"
  #     - "--server"
  #     - "--log-level=info"
  #     - "--addr=0.0.0.0:8181"
  #     - "--config-file=/config/config.yaml"
  #     - "--authentication=token"
  #     - "--authorization=basic"
  #   depends_on:
  #     backend:
  #       condition: service_healthy
  #     vault-init:
  #       condition: service_healthy
  #   networks:
  #     - opa-net

  postgres:
    image: postgres:16-alpine
    container_name: aegis-postgres
    environment:
      POSTGRES_DB: opa_studio
      POSTGRES_USER: opa_user
      POSTGRES_PASSWORD: opa_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Init scripts run only on a fresh data directory; creates the `app_auth`
      # database used by the demo app's better-auth tables.
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opa_user -d opa_studio"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - opa-net

  vault:
    image: hashicorp/vault:1.18
    container_name: aegis-trustvault
    cap_add:
      - IPC_LOCK
    entrypoint: ["vault"]
    command: ["server", "-config=/vault/config/config.hcl"]
    ports:
      - "8200:8200"
    environment:
      VAULT_ADDR: http://127.0.0.1:8200
    volumes:
      - vault_data:/vault/file
      - vault_secrets:/vault/secrets
      - ./vault/config.hcl:/vault/config/config.hcl:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8200/v1/sys/health?standbyok=true&sealedcode=200&uninitcode=200"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - opa-net

  vault-init:
    image: hashicorp/vault:1.18
    container_name: aegis-trustvault-init
    depends_on:
      vault:
        condition: service_healthy
    volumes:
      - vault_secrets:/vault/secrets
      - ./vault/bootstrap.sh:/vault/init/bootstrap.sh:ro
    environment:
      VAULT_ADDR: http://vault:8200
    entrypoint: ["/bin/sh", "/vault/init/bootstrap.sh"]
    networks:
      - opa-net
    restart: unless-stopped
    healthcheck:
      # All tokens must be in place before downstream services start: backend
      # signs with backend_token, PEP signs with pep_token, OPA pulls the
      # bundle with opa_bundle_token. opa_bundle_token is generated LAST in
      # bootstrap.sh, so its presence is the gate.
      # (opa_trust_init_token is still minted for backward-compat but unused —
      # the opa-trust-init sidecar was removed in the bundle-pull migration.)
      test: ["CMD-SHELL", "test -f /vault/secrets/backend_token && test -f /vault/secrets/pep_token && test -f /vault/secrets/opa_bundle_token"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 2s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aegis-core
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - OPA_URL=http://opa:8181
      - DATABASE_URL=postgres://opa_user:opa_pass@postgres:5432/opa_studio
      - NODE_ENV=production
      - SEED_TEMPLATES=${SEED_TEMPLATES:-false}
      - "BOOTSTRAP_ADMIN_USERNAME=${BOOTSTRAP_ADMIN_USERNAME:-admin}"
      # KMS adapter. Default vault; override KMS_PROVIDER for cloud/HSM.
      - KMS_PROVIDER=${KMS_PROVIDER:-vault}
      - KMS_KEY_ID=${KMS_KEY_ID:-audit-signing}
      # Per-purpose KMS keyIds for the platform-signing keys.
      - KMS_KEY_ID_OPA_AUTH=${KMS_KEY_ID_OPA_AUTH:-opa-auth-signing}
      - KMS_KEY_ID_SESSION=${KMS_KEY_ID_SESSION:-session-signing}
      - KMS_KEY_ID_PEP_OPA_AUTH=${KMS_KEY_ID_PEP_OPA_AUTH:-pep-opa-auth-signing}
      # Bearer token OPA presents to GET /bundle — verified here (constant-time)
      # before serving the secret-bearing bundle. Same vault_secrets volume.
      - BUNDLE_TOKEN_FILE=/vault/secrets/opa_bundle_token
      # Dir the bundle builder reads system_authz.rego / studio_authz.rego from
      # (mounted ./opa below). They're baked into the bundle, not loaded by OPA.
      - OPA_AUTHZ_DIR=/app/opa
      # Vault-provider env (used when KMS_PROVIDER=vault).
      - VAULT_ADDR=${VAULT_ADDR:-http://vault:8200}
      - VAULT_TRANSIT_KEY=${VAULT_TRANSIT_KEY:-audit-signing}
      - VAULT_TOKEN_FILE=/vault/secrets/backend_token
    volumes:
      - bootstrap_secret:/data
      - vault_secrets:/vault/secrets:ro
      # Source of the authz Rego the backend folds into the bundle (read-only).
      - ./opa:/app/opa:ro
    depends_on:
      # OPA dependency is INVERTED (opa now depends_on backend) so it's gone
      # from here. The backend builds/serves the bundle without needing OPA.
      postgres:
        condition: service_healthy
      vault-init:
        condition: service_healthy
    healthcheck:
      # Readiness gate for OPA's depends_on. 200 once boot (schema + KMS +
      # platform keys + initial bundle warm) completes. node:20-alpine ships
      # busybox wget; a 503 (not-ready) exits non-zero → unhealthy.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    networks:
      - opa-net

  pep:
    build:
      context: ./pep
      dockerfile: Dockerfile
    container_name: aegis-sentry
    ports:
      - "3002:3002"
    environment:
      - PEP_PORT=3002
      - OPA_URL=http://opa:8181
      - PEP_REQUEST_TIMEOUT_MS=2000
      # KMS signer wiring — PEP mints its own EdDSA JWTs for OPA.
      - KMS_PROVIDER=${KMS_PROVIDER:-vault}
      - KMS_KEY_ID_PEP_OPA_AUTH=${KMS_KEY_ID_PEP_OPA_AUTH:-pep-opa-auth-signing}
      - VAULT_ADDR=${VAULT_ADDR:-http://vault:8200}
      - VAULT_TOKEN_FILE=/vault/secrets/pep_token
      # PEP-01: per-caller auth (multi-mode). Each pep_callers row declares
      # its own auth_mode (hmac | mtls | jwt); the PEP dispatches per
      # request. PEP_DEV_ALLOW_ANON keeps the laptop path frictionless by
      # admitting unauthenticated requests as "anonymous" — refused under
      # NODE_ENV=production.
      - NODE_ENV=${PEP_NODE_ENV:-development}
      - PEP_DEV_ALLOW_ANON=${PEP_DEV_ALLOW_ANON:-true}
      # mtls support requires all three TLS files. When set the PEP listens
      # HTTPS with requestCert:true so hmac/jwt callers can still connect
      # cert-less. When unset the PEP listens HTTP and mtls-mode rows are
      # unusable (they'd need a cert nobody can present).
      - PEP_TLS_CERT=${PEP_TLS_CERT:-}
      - PEP_TLS_KEY=${PEP_TLS_KEY:-}
      - PEP_TLS_CA=${PEP_TLS_CA:-}
      - PEP_ALLOWED_CALLERS=${PEP_ALLOWED_CALLERS:-}
      # JWT verifier wires when iss + aud are both set. Per-caller jwt rows
      # are unusable without them; the dispatcher returns mode_not_configured.
      - PEP_JWKS_URL=${PEP_JWKS_URL:-http://backend:3001/.well-known/jwks.json}
      - PEP_JWT_ISSUER=${PEP_JWT_ISSUER:-}
      - PEP_JWT_AUDIENCE=${PEP_JWT_AUDIENCE:-}
      - PEP_HMAC_WINDOW_MS=${PEP_HMAC_WINDOW_MS:-30000}
      - PEP_NONCE_CACHE_MAX=${PEP_NONCE_CACHE_MAX:-50000}
      - PEP_CALLER_TTL_MS=${PEP_CALLER_TTL_MS:-30000}
    volumes:
      - vault_secrets:/vault/secrets:ro
    depends_on:
      opa:
        condition: service_healthy
      vault-init:
        condition: service_healthy
    networks:
      - opa-net
    restart: unless-stopped

  # Template for a dedicated tenant PEP (Aegis Sentry) container (Physical Tenant Isolation).
  # To deploy a physical PEP container for a specific tenant, copy this service definition,
  # assign a unique port mapping (e.g. 3003:3002), and update OPA_URL to target the tenant's dedicated OPA replica.
  # pep-tenant-example:
  #   build:
  #     context: ./pep
  #     dockerfile: Dockerfile
  #   ports:
  #     - "3003:3002"
  #   environment:
  #     - PEP_PORT=3002
  #     - OPA_URL=http://opa-tenant-example:8181
  #     - KMS_PROVIDER=${KMS_PROVIDER:-vault}
  #     - KMS_KEY_ID_PEP_OPA_AUTH=${KMS_KEY_ID_PEP_OPA_AUTH:-pep-opa-auth-signing}
  #     - VAULT_ADDR=${VAULT_ADDR:-http://vault:8200}
  #     - VAULT_TOKEN_FILE=/vault/secrets/pep_token
  #     - NODE_ENV=${PEP_NODE_ENV:-development}
  #     - PEP_DEV_ALLOW_ANON=${PEP_DEV_ALLOW_ANON:-true}
  #     - PEP_JWKS_URL=${PEP_JWKS_URL:-http://backend:3001/.well-known/jwks.json}
  #     - PEP_HMAC_WINDOW_MS=${PEP_HMAC_WINDOW_MS:-30000}
  #   volumes:
  #     - vault_secrets:/vault/secrets:ro
  #   depends_on:
  #     opa-tenant-example:
  #       condition: service_healthy
  #   networks:
  #     - opa-net
  #   restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aegis-studio
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - opa-net

networks:
  opa-net:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  bootstrap_secret:
    driver: local
  app-audit-data:
    driver: local
  # Vault's file storage backend — holds the encrypted audit signing key.
  # MUST persist for the deployment's lifetime; losing it freezes the chain.
  vault_data:
    driver: local
  # Shared between vault-init (writer) and consumers (read-only). Holds the
  # unseal key + root token (init.json), the per-service signer tokens, and
  # the opa_bundle_token shared secret for the bundle endpoint.
  vault_secrets:
    driver: local
